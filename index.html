<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flow Connect - Multiplayer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="panel">
        <div class="brand">
          <h1>Flow Connect</h1>
          <p>Connect matching dots without crossing paths.</p>
        </div>

        <label class="field">
          Player Name
          <input id="playerName" type="text" maxlength="18" placeholder="Type your name" />
        </label>

        <div class="actions">
          <button id="soloBtn" class="primary">Play Solo</button>
          <button id="createBtn" class="accent" disabled>Create Server</button>
          <div class="joinRow">
            <input id="serverCode" type="text" maxlength="6" placeholder="Server code" />
            <button id="joinBtn" class="accent" disabled>Join</button>
          </div>
          <button id="disconnectBtn" class="ghost hidden">Leave Server</button>
        </div>

        <div class="panelSection">
          <div class="statusRow">
            <span class="statusLabel">Status</span>
            <span id="statusBadge" class="statusBadge solo">Solo</span>
          </div>
          <div class="statusRow">
            <span class="statusLabel">Server</span>
            <span id="roomCode">-</span>
          </div>
          <div class="statusRow">
            <span class="statusLabel">Players</span>
          </div>
          <ul id="playersList" class="playersList"></ul>
        </div>

        <div class="panelSection">
          <button id="resetBtn" class="ghost">Reset Board</button>
          <p id="hint" class="hint"></p>
        </div>
      </aside>

      <main class="game">
        <div class="gameHeader">
          <div>
            <h2>Connect the Dots</h2>
            <p id="subtitle">Drag from a dot to its matching color.</p>
          </div>
          <div id="legend" class="legend"></div>
        </div>

        <div id="gridWrapper" class="gridWrapper">
          <div id="grid" class="grid"></div>
          <div id="winOverlay" class="winOverlay hidden">
            <div class="winCard">
              <h3>Board Complete!</h3>
              <p>Nice work. Want to keep experimenting?</p>
              <button id="keepPlayingBtn" class="primary">Keep Playing</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="puzzles.js"></script>
    <script src="app.js"></script>
  </body>
</html>
